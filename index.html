<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline: The Undersea Maze</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="status-dev" class="status-chip">
                <span style="color: var(--dev-color)">■</span> Dev
            </div>
            <div id="status-test" class="status-chip">
                <span style="color: var(--test-color)">■</span> Test
            </div>
            <div id="status-prod" class="status-chip">
                <span style="color: var(--prod-color)">★</span> Production
            </div>
            <div id="level-display" class="status-chip" style="margin-top: 20px; border-color: rgba(255,255,255,0.2)">
                🚀 <span id="level-num" style="margin-left: 5px; color: var(--player-glow)">1</span>
            </div>
            <div id="high-score-panel" class="status-chip"
                style="margin-top: 10px; border-color: rgba(251, 191, 36, 0.3); font-size: 0.8rem;">
                🏆 <span id="high-score-val" style="margin-left: 5px; color: #fbbf24">0</span>
            </div>
            <div id="current-score-panel" class="status-chip"
                style="margin-top: 10px; border-color: rgba(14, 165, 233, 0.3); font-size: 0.8rem;">
                💰 <span id="current-score-val" style="margin-left: 5px; color: #0ea5e9">0</span>
            </div>
        </div>

        <div id="victory-overlay">
            <h1>Deployment Successful</h1>
            <p id="victory-msg">The system is stable. Production is humming.</p>
            <div id="score-display">Level Score: <span id="final-score">0</span></div>
            <div id="total-score-display" style="font-size: 1.2rem; color: #0ea5e9; margin-top: 10px">Total: <span
                    id="accumulated-score">0</span></div>
            <div class="restart-hint">Press [Space] or Tap to Continue</div>
        </div>

        <svg id="game-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <filter id="box-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <linearGradient id="pipe-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#475569;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
                </linearGradient>
            </defs>

            <g id="world-layer">
                <g id="maze-layer"></g>
                <g id="target-layer"></g>
                <image id="player" href="octopus.png" width="20" height="20" filter="url(#glow)"></image>

                <g id="compass-telescope" opacity="0">
                    <!-- Thin end at player -->
                    <rect x="0" y="-1.5" width="8" height="3" fill="#cbd5e1" rx="0.5" />
                    <!-- Medium segment -->
                    <rect x="7" y="-2.5" width="10" height="5" fill="#94a3b8" rx="1" />
                    <!-- Thick end pointing away -->
                    <rect x="16" y="-4" width="14" height="8" fill="#64748b" rx="1.5" />
                    <!-- Objective lens -->
                    <circle cx="30" cy="0" r="3.5" fill="cyan" opacity="0.8" filter="url(#glow)" />
                </g>
            </g>

            <defs>
                <radialGradient id="player-grad">
                    <stop offset="0%" stop-color="#7dd3fc" />
                    <stop offset="100%" stop-color="#0ea5e9" />
                </radialGradient>
            </defs>
        </svg>

        <div class="hint-overlay">Use Arrows to move • Hold Space for Compass • Touch & Drag to move • Tap Octopus for
            Compass</div>
    </div>

    <script src="game.js"></script>
</body>
>
</body>

</html>
